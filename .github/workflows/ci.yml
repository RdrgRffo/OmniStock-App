name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Test
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./mvnw -B clean test -Dspring.profiles.active=test

      - name: Package
        run: ./mvnw -B package -DskipTests

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- run

      - name: Build
        env:
          VITE_API_BASE: /api/v1
          VITE_GRAFANA_DASHBOARD_URL: https://example.com/grafana
          VITE_PROMETHEUS_DASHBOARD_URL: https://example.com/prometheus
        run: npm run build

  postman-tests:
    name: Postman / Smoke Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Make mvnw executable
        run: chmod +x backend/mvnw

      - name: Build backend JAR
        run: ./mvnw -B package -DskipTests
        working-directory: backend

      - name: Build frontend
        env:
          VITE_API_BASE: /api/v1
          VITE_GRAFANA_DASHBOARD_URL: https://example.com/grafana
          VITE_PROMETHEUS_DASHBOARD_URL: https://example.com/prometheus
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Start services with Docker Compose
        run: |
          # Create .env file with defaults for CI
          cat > .env << 'EOF'
          SPRING_DATASOURCE_URL=jdbc:mariadb://mariadb-local:3306/omnistockdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME=omnistock
          SPRING_DATASOURCE_PASSWORD=omnistock_pass
          APP_SECURITY_SECRET_KEY=0123456789abcdef
          JWT_SECRET_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          GF_SECURITY_ADMIN_USER=admin
          GF_SECURITY_ADMIN_PASSWORD=admin
          EOF
          docker compose up -d --wait
        timeout-minutes: 10

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 10
          done
          echo "Backend failed to become healthy after 30 attempts!"
          echo "=== Docker logs for backend ==="
          docker compose logs --tail=100 backend
          echo "=== Docker logs for database ==="
          docker compose logs --tail=50 mariadb-local
          exit 1

      - name: Run smoke tests (test-deploy.ps1)
        shell: pwsh
        run: pwsh ./test-deploy.ps1

      - name: Upload Postman results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-test-results
          path: |
            OmniStock.postman_collection.json
            OmniStock.postman_environment.json
            test-deploy.ps1
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v
