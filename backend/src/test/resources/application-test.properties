# =============================================================================
# Test profile — secrets inlined for tests only.
# Local: H2 in-memory. CI: same profile but MariaDB URL comes from env (see ci.yml).
# =============================================================================

# Secrets (normalmente desde .env en producción)
jwt.secret-key=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
app.security.secret-key=0123456789abcdef

# Datasource: override with SPRING_DATASOURCE_* in CI; default to H2 for developer laptops
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Main application pins MariaDB dialect; override for H2 locally, or set TEST_HIBERNATE_DIALECT in CI.
spring.jpa.properties.hibernate.dialect=${TEST_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# Avoid writing under /app/logs during tests (e.g. Windows)
logging.file.name=
logging.level.org.hibernate.SQL=WARN

# No Flyway en tests unitarios (@SpringBootTest usa H2 + create-drop)
spring.flyway.enabled=false
omnistock.seed.enabled=false
