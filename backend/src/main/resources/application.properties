spring.application.name=backend
spring.profiles.include=resilience

# =============================================================================
# 1. Configuración de la Fuente de Datos (DataSource)
# =============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# =============================================================================
# 2. Configuración de JPA / Hibernate
#
# 'update' es apropiado para desarrollo. No borra datos, solo actualiza el
# esquema si las entidades cambian.
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# Seeders demo (admin/cliente, proveedores mock). Desactivar en prod con omnistock.seed.enabled=false
omnistock.seed.enabled=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================================================
# 3. Seguridad — Clave AES para EncryptionService y JWT
# =============================================================================
app.security.secret-key=${APP_SECURITY_SECRET_KEY}
jwt.secret-key=${JWT_SECRET_KEY}

# =============================================================================
# 4. Logging
#
# NOTA: logging.level.org.hibernate.SQL=DEBUG está en application-dev.properties.
# En producción se usa INFO para evitar data leakage y overhead de I/O.
# =============================================================================
logging.level.root=INFO
logging.level.com.omnistock.backend=INFO
logging.level.org.springframework.security=INFO
logging.file.name=/app/logs/backend.log

# =============================================================================
# 5. Actuator y Métricas
# =============================================================================
management.endpoints.web.exposure.include=health
