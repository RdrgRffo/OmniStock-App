# =============================================================================
# Perfil 'dev' — Configuración solo para desarrollo local
# Actívalo con: --spring.profiles.active=dev
# o en Docker: SPRING_PROFILES_ACTIVE=dev
# =============================================================================

# Logging detallado de Hibernate (solo desarrollo — evita data leakage en prod)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
